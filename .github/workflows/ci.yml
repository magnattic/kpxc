name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./bin
          severity: style

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install keepassxc-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y keepassxc
      - name: Run integration tests
        run: bash tests/test.sh
